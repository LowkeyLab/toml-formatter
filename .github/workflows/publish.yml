name: Publish

on:
  workflow_dispatch:
    inputs:
      validate_plugin_portal_only:
        description: Validate the Gradle Plugin Portal publication without publishing
        required: true
        type: boolean
        default: true
      version_date:
        description: Optional release date in YYYY-MM-DD format; defaults to the workflow run date in UTC
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish artifacts
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.release.outputs.release_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Resolve release version inputs
        id: release
        run: |
          if [[ -n "${{ inputs.version_date }}" ]]; then
            version_date="${{ inputs.version_date }}"
          else
            version_date="$(date -u +%F)"
          fi

          if [[ ! "$version_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || [[ "$(date -u -d "$version_date" +%F 2>/dev/null)" != "$version_date" ]]; then
            echo "version_date must use YYYY-MM-DD format, got: $version_date" >&2
            exit 1
          fi

          release_version="${version_date//-/.}+${GITHUB_RUN_NUMBER}"
          {
            echo "VERSION_DATE=$version_date"
            echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}"
          } >> "$GITHUB_ENV"
          {
            echo "release_version=$release_version"
            echo "release_tag=v$release_version"
            echo "release_sha=$GITHUB_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Validate Gradle Plugin Portal publication
        if: ${{ inputs.validate_plugin_portal_only }}
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: >-
          nix develop --command ./gradlew
          :gradle-plugin:publishPlugins
          --validate-only
          --no-daemon
          -PversionDate="${VERSION_DATE}"
          -PbuildNumber="${BUILD_NUMBER}"

      - name: Publish to Gradle Plugin Portal
        if: ${{ ! inputs.validate_plugin_portal_only }}
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: >-
          nix develop --command ./gradlew
          :gradle-plugin:publishPlugins
          --no-daemon
          -PversionDate="${VERSION_DATE}"
          -PbuildNumber="${BUILD_NUMBER}"

  release:
    name: Create GitHub release
    needs: publish
    if: ${{ needs.publish.result == 'success' && !inputs.validate_plugin_portal_only }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.publish.outputs.release_tag }}
          RELEASE_SHA: ${{ needs.publish.outputs.release_sha }}
        run: >-
          gh release create "$RELEASE_TAG"
          --repo "$GITHUB_REPOSITORY"
          --target "$RELEASE_SHA"
          --title "$RELEASE_TAG"
          --generate-notes
          --latest
