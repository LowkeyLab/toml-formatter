name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Gradle checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CONFIG_CACHE_KEY }}

      - name: Run checks
        run: nix develop --command ./gradlew check --no-daemon

      - name: Check publication metadata
        run: >-
          nix develop --command ./gradlew
          :lib:checkPomFileForMavenPublication
          :gradle-plugin:checkPomFileForPluginMavenPublication
          :gradle-plugin:checkPomFileForTomlFormatterPluginMarkerMavenPublication
          --no-daemon
